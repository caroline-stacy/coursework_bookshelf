<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Книжная полка — Мои книги</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- ==================== ШАПКА ==================== -->
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="site-logo">
        <span class="logo-icon">📚</span>
        <div>
          <span class="logo-text">Книжная полка</span>
          <span class="logo-sub">Личная библиотека</span>
        </div>
      </a>
      <nav>
        <ul class="nav-links">
          <li><a href="index.html" class="active">Все книги</a></li>
          <li><a href="form.html">+ Добавить</a></li>
          <li><a href="stats.html">Статистика</a></li>
          <li><a href="about.html">О проекте</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- ==================== ОСНОВНОЕ ==================== -->
  <main class="page-wrapper">

    <!-- Заголовок страницы -->
    <div class="page-hero">
      <p class="eyebrow">Личная коллекция</p>
      <h1>Мои <em>книги</em></h1>
      <p class="subtitle">Каталог прочитанного, читаемого и желаемого</p>
    </div>

    <!-- Статистика-пиллы -->
    <div class="stats-bar">
      <div class="stat-pill">📚 Всего: <strong id="countTotal">0</strong></div>
      <div class="stat-pill">✅ Прочитано: <strong id="countRead">0</strong></div>
      <div class="stat-pill">📖 Читаю: <strong id="countReading">0</strong></div>
      <div class="stat-pill">🔖 Хочу: <strong id="countWant">0</strong></div>
    </div>

    <!-- Тулбар: поиск + фильтры + кнопка добавить -->
    <div class="toolbar">
      <div class="toolbar-left">
        <!-- Поиск -->
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input type="text" id="searchInput" placeholder="Поиск по названию, автору...">
        </div>

        <!-- Фильтры -->
        <div class="filter-tabs">
          <button class="filter-btn active" data-filter="all">Все</button>
          <button class="filter-btn" data-filter="read">Прочитано</button>
          <button class="filter-btn" data-filter="reading">Читаю</button>
          <button class="filter-btn" data-filter="want">Хочу читать</button>
        </div>
      </div>

      <div class="toolbar-right">
        <a href="form.html" class="btn btn-primary">
          <span>＋</span> Добавить книгу
        </a>
      </div>
    </div>

    <!-- Сетка книг -->
    <div class="books-grid" id="booksGrid">
      <!-- Карточки отрисовываются через JS -->
    </div>

  </main>

  <footer class="site-footer">
    Книжная полка &copy; 2026 &nbsp;·&nbsp; Данные хранятся локально в вашем браузере
  </footer>

  <!-- Скрипты (порядок важен) -->
  <script src="js/storage.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
